spring.application.name=ieum-ai
spring.config.import=optional:file:./app-ai/.env[.properties],optional:file:./.env[.properties]
server.port=8080

# DB 접속 정보는 컨테이너 환경변수(.env)로 주입한다.
#   SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.sql.init.mode=never

app.ai.database.embedding-dimensions=768
app.ai.database.required-extensions=vector,postgis,pgcrypto

app.ai.features.report-review-enabled=${APP_AI_FEATURES_REPORT_REVIEW_ENABLED:false}
app.ai.report.image-max-bytes=${APP_AI_REPORT_IMAGE_MAX_BYTES:3750000}
app.ai.report.image-max-total-bytes=${APP_AI_REPORT_IMAGE_MAX_TOTAL_BYTES:15000000}
app.ai.report.image-allowed-hosts=${APP_AI_REPORT_IMAGE_ALLOWED_HOSTS:}
app.ai.report.image-download-timeout=${APP_AI_REPORT_IMAGE_DOWNLOAD_TIMEOUT:5s}
